<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StickyNotes - Authentication Required</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3a 100%);
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    
    .auth-container {
      background: rgba(45, 45, 58, 0.95);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      padding: 40px;
      width: 400px;
      max-width: 90vw;
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }
    
    .auth-header p {
      color: #a0a0a0;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }
    
    .form-group input:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
      background: rgba(255, 255, 255, 0.08);
    }
    
    .form-group input::placeholder {
      color: #666;
    }
    
    .form-group .input-error {
      position: absolute;
      bottom: -20px;
      left: 0;
      color: #ff4757;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    .form-group.error input {
      border-color: #ff4757;
    }
    
    .form-group.error .input-error {
      opacity: 1;
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 4px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      color: #a0a0a0;
    }
    
    .auth-tab.active {
      background: #4a90e2;
      color: #ffffff;
    }
    
    .auth-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .auth-button {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(45deg, #4a90e2, #357abd);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
      margin-bottom: 15px;
    }
    
    .auth-button:hover {
      background: linear-gradient(45deg, #357abd, #2d5aa0);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
    }
    
    .auth-button:active {
      transform: translateY(0);
    }
    
    .auth-button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .loading-spinner {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    
    .loading-spinner.active {
      display: block;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid #4a90e2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error-message {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      color: #ff4757;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .success-message {
      background: rgba(46, 213, 115, 0.1);
      border: 1px solid rgba(46, 213, 115, 0.3);
      color: #2ed573;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .success-message.show {
      display: block;
    }
    
    .password-strength {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    
    .password-strength-bar.weak {
      background: #ff4757;
      width: 25%;
    }
    
    .password-strength-bar.fair {
      background: #ffa502;
      width: 50%;
    }
    
    .password-strength-bar.good {
      background: #2ed573;
      width: 75%;
    }
    
    .password-strength-bar.strong {
      background: #20bf6b;
      width: 100%;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: #a0a0a0;
      font-size: 12px;
    }
    
    .security-notice {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      color: #ffc107;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
    
    .security-notice.show {
      display: block;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .remember-me input[type="checkbox"] {
      margin-right: 8px;
    }
    
    .remember-me label {
      font-size: 13px;
      color: #a0a0a0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>🔐 Secure Access Required</h1>
      <p>Please authenticate to access StickyNotes</p>
    </div>
    
    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>
    <div class="security-notice" id="security-notice"></div>
    
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>
    
    <!-- Login Form -->
    <div class="auth-form active" id="login-form">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" required>
        <div class="input-error"></div>
      </div>
      
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
        <div class="input-error"></div>
      </div>
      
      <div class="remember-me">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember me for 30 days</label>
      </div>
      
      <button class="auth-button" onclick="handleLogin()">Login</button>
    </div>
    
    <!-- Registration Form -->
    <div class="auth-form" id="register-form">
      <div class="form-group">
        <label for="register-username">Username</label>
        <input type="text" id="register-username" placeholder="Choose a username" required>
        <div class="input-error"></div>
      </div>
      
      <div class="form-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" placeholder="Create a strong password" required>
        <div class="password-strength">
          <div class="password-strength-bar" id="password-strength-bar"></div>
        </div>
        <div class="input-error"></div>
      </div>
      
      <div class="form-group">
        <label for="register-confirm-password">Confirm Password</label>
        <input type="password" id="register-confirm-password" placeholder="Confirm your password" required>
        <div class="input-error"></div>
      </div>
      
      <button class="auth-button" onclick="handleRegister()">Create Account</button>
    </div>
    
    <div class="loading-spinner" id="loading-spinner">
      <div class="spinner"></div>
      <p style="margin-top: 10px;">Processing...</p>
    </div>
    
    <div class="auth-footer">
      <p>Your session will expire after 24 hours of inactivity</p>
      <p>© 2024 StickyNotes - Secure Note Management</p>
    </div>
  </div>
  
  <script src="authenticationDialog.js"></script>
</body>
</html>
